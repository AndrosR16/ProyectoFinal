<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Iniciar sesión - Farmacia</title>

    <link th:replace="~{fragments/head :: bootstrap-css}">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <main class="container py-5">

        <div class="row justify-content-center">

            <div class="col-lg-6">

                <section class="encabezado-pagina mb-4">

                    <span class="insignia-proveedor mb-2">
                        Acceso al sistema
                    </span>

                    <h1>
                        Iniciar sesión
                    </h1>

                    <p>
                        Ingrese sus credenciales para acceder al panel administrativo.
                    </p>

                </section>

                <section class="card formulario-farmacia">

                    <div class="card-body">

                        <div class="alert alert-success"
                             th:if="${ok}"
                             th:text="${ok}">
                        </div>

                        <div class="alert alert-success"
                             th:if="${param.logout}">
                            Sesión cerrada correctamente.
                        </div>

                        <div class="alert alert-danger"
                             th:if="${param.error}">
                            Usuario o contraseña incorrectos.
                        </div>

                        <form th:action="@{/login}"
                              method="post">

                            <div class="mb-4">

                                <label for="username" class="form-label">
                                    Usuario
                                </label>

                                <input type="text"
                                       id="username"
                                       name="username"
                                       class="form-control"
                                       placeholder="Ingrese su usuario">

                            </div>

                            <div class="mb-4">

                                <label for="password" class="form-label">
                                    Contraseña
                                </label>

                                <input type="password"
                                       id="password"
                                       name="password"
                                       class="form-control"
                                       placeholder="Ingrese su contraseña">

                            </div>

                            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">

                                <a th:href="@{/registro}"
                                   class="btn btn-secondary">
                                    Crear cuenta
                                </a>

                                <button type="submit"
                                        class="btn btn-farmacia">
                                    Ingresar
                                </button>

                            </div>

                        </form>

                    </div>

                </section>

            </div>

        </div>

    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <div th:replace="~{fragments/head :: bootstrap-js}"></div>

</body>

</html>
