<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title th:text="${cliente.id == null}
        ? 'Nuevo cliente'
        : 'Editar cliente'">
        Cliente
    </title>

    <link th:replace="~{fragments/head :: bootstrap-css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <section class="encabezado-pagina mb-4">

                <span class="insignia-proveedor mb-2"
                      th:text="${cliente.id == null}
                          ? 'Nuevo registro'
                          : 'Actualización de datos'">
                </span>

                <h1 th:text="${cliente.id == null}
                    ? 'Registrar cliente'
                    : 'Editar cliente'">
                </h1>

                <p th:text="${cliente.id == null}
                    ? 'Complete la información para registrar un cliente.'
                    : 'Actualice la información del cliente seleccionado.'">
                </p>

            </section>

            <section class="card formulario-farmacia">

                <div class="card-body">

                    <form th:object="${cliente}"
                          th:action="${cliente.id == null}
                              ? @{/clientes}
                              : @{/clientes/{id}(id=${cliente.id})}"
                          method="post">

                        <div class="mb-4">

                            <label for="nombre" class="form-label">
                                Nombre completo
                            </label>

                            <input type="text"
                                   id="nombre"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('nombre')}
                                       ? 'is-invalid'"
                                   th:field="*{nombre}"
                                   placeholder="Ejemplo: María Rodríguez">

                            <div class="invalid-feedback"
                                 th:errors="*{nombre}">
                            </div>

                        </div>

                        <div class="mb-4">

                            <label for="telefono" class="form-label">
                                Teléfono
                            </label>

                            <input type="text"
                                   id="telefono"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('telefono')}
                                       ? 'is-invalid'"
                                   th:field="*{telefono}"
                                   maxlength="20"
                                   inputmode="numeric"
                                   placeholder="Ejemplo: 88887777">

                            <div class="invalid-feedback"
                                 th:errors="*{telefono}">
                            </div>

                        </div>

                        <div class="mb-4">

                            <label for="correo" class="form-label">
                                Correo electrónico
                            </label>

                            <input type="email"
                                   id="correo"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('correo')}
                                       ? 'is-invalid'"
                                   th:field="*{correo}"
                                   placeholder="Ejemplo: cliente@correo.com">

                            <div class="invalid-feedback"
                                 th:errors="*{correo}">
                            </div>

                        </div>

                        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">

                            <a th:href="@{/clientes}"
                               class="btn btn-secondary">
                                Volver
                            </a>

                            <button type="submit"
                                    class="btn btn-farmacia"
                                    th:text="${cliente.id == null}
                                        ? 'Registrar cliente'
                                        : 'Guardar cambios'">
                                Guardar
                            </button>

                        </div>

                    </form>

                </div>

            </section>

        </div>

    </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<div th:replace="~{fragments/head :: bootstrap-js}"></div>

<script>
    const telefono = document.getElementById('telefono');

    telefono.addEventListener('input', function () {
        this.value = this.value.replace(/[^0-9+\-\s]/g, '');
    });
</script>

</body>
</html>
