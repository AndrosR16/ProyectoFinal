<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Clientes - Farmacia Vida</title>

    <link th:replace="~{fragments/head :: bootstrap-css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-5">

    <section class="encabezado-pagina mb-4">

        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">

            <div>
                <span class="insignia-proveedor mb-2">
                    Gestión administrativa
                </span>

                <h1>Clientes</h1>

                <p>
                    Administre la información de los clientes registrados.
                </p>
            </div>

            <a th:href="@{/clientes/nuevo}"
               class="btn btn-farmacia">
                Nuevo cliente
            </a>

        </div>

    </section>

    <div class="alert alert-success"
         th:if="${ok}"
         th:text="${ok}">
    </div>

    <div class="alert alert-danger"
         th:if="${error}"
         th:text="${error}">
    </div>

    <section class="contenedor-tabla">

        <div class="table-responsive">

            <table class="table tabla-farmacia align-middle">

                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Teléfono</th>
                    <th>Correo</th>
                    <th class="text-center">Acciones</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="cliente : ${clientes}">

                    <td th:text="${cliente.id}"></td>

                    <td>
                        <span class="nombre-proveedor"
                              th:text="${cliente.nombre}">
                        </span>
                    </td>

                    <td th:text="${cliente.telefono}"></td>

                    <td th:text="${cliente.correo}"></td>

                    <td class="text-center">

                        <div class="d-flex justify-content-center flex-wrap gap-2">

                            <a th:href="@{/clientes/{id}/editar(id=${cliente.id})}"
                               class="btn btn-editar btn-sm">
                                Editar
                            </a>

                            <button type="button"
                                    class="btn btn-eliminar btn-sm"
                                    data-bs-toggle="modal"
                                    data-bs-target="#modalEliminar"
                                    th:attr="data-id=${cliente.id},
                                             data-nombre=${cliente.nombre}">
                                Eliminar
                            </button>

                        </div>

                    </td>

                </tr>

                <tr th:if="${#lists.isEmpty(clientes)}">

                    <td colspan="5">

                        <div class="estado-vacio">

                            <h3>No hay clientes registrados</h3>

                            <p>
                                Registre el primer cliente para comenzar.
                            </p>

                            <a th:href="@{/clientes/nuevo}"
                               class="btn btn-farmacia">
                                Registrar cliente
                            </a>

                        </div>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </section>

</main>

<div class="modal fade"
     id="modalEliminar"
     tabindex="-1"
     aria-labelledby="modalEliminarLabel"
     aria-hidden="true">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title" id="modalEliminarLabel">
                    Confirmar eliminación
                </h5>

                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="modal"
                        aria-label="Cerrar">
                </button>

            </div>

            <div class="modal-body">

                <p>
                    ¿Está seguro de eliminar al cliente
                    <strong id="nombreCliente"></strong>?
                </p>

            </div>

            <div class="modal-footer">

                <button type="button"
                        class="btn btn-secondary"
                        data-bs-dismiss="modal">
                    Cancelar
                </button>

                <form id="formEliminar" method="post">

                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}">

                    <button type="submit"
                            class="btn btn-eliminar">
                        Eliminar cliente
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<div th:replace="~{fragments/head :: bootstrap-js}"></div>

<script>
    const modalEliminar = document.getElementById('modalEliminar');

    modalEliminar.addEventListener('show.bs.modal', function (event) {
        const boton = event.relatedTarget;

        const id = boton.getAttribute('data-id');
        const nombre = boton.getAttribute('data-nombre');

        document.getElementById('nombreCliente').textContent = nombre;

        document.getElementById('formEliminar').action =
            '/clientes/' + id + '/eliminar';
    });
</script>

</body>
</html>
