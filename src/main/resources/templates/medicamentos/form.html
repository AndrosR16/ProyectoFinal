<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title th:text="${medicamento.id == null}
        ? 'Nuevo medicamento'
        : 'Editar medicamento'">
        Medicamento
    </title>

    <link th:replace="~{fragments/head :: bootstrap-css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="container py-5">

        <div class="row justify-content-center">

            <div class="col-lg-8">

                <section class="encabezado-pagina mb-4">

                    <span class="insignia-proveedor mb-2"
                          th:text="${medicamento.id == null}
                              ? 'Nuevo registro'
                              : 'Actualización de datos'">
                    </span>

                    <h1 th:text="${medicamento.id == null}
                        ? 'Registrar medicamento'
                        : 'Editar medicamento'">
                    </h1>

                    <p th:text="${medicamento.id == null}
                        ? 'Complete la información para registrar un medicamento.'
                        : 'Actualice la información del medicamento seleccionado.'">
                    </p>

                </section>

                <section class="card formulario-farmacia">

                    <div class="card-body">

                        <form th:object="${medicamento}"
                              th:action="${medicamento.id == null}
                                  ? @{/medicamentos}
                                  : @{/medicamentos/{id}(id=${medicamento.id})}"
                              method="post">

                            <div class="mb-4">

                                <label for="nombre" class="form-label">
                                    Nombre del medicamento
                                </label>

                                <input type="text"
                                       id="nombre"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('nombre')}
                                           ? 'is-invalid'"
                                       th:field="*{nombre}"
                                       placeholder="Ejemplo: Acetaminofén">

                                <div class="invalid-feedback"
                                     th:errors="*{nombre}">
                                </div>

                            </div>

                            <div class="row">

                                <div class="col-md-6 mb-4">

                                    <label for="precio" class="form-label">
                                        Precio
                                    </label>

                                    <input type="number"
                                           id="precio"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('precio')}
                                               ? 'is-invalid'"
                                           th:field="*{precio}"
                                           min="0"
                                           step="0.01"
                                           placeholder="Ejemplo: 2500.00">

                                    <div class="invalid-feedback"
                                         th:errors="*{precio}">
                                    </div>

                                </div>

                                <div class="col-md-6 mb-4">

                                    <label for="stock" class="form-label">
                                        Cantidad en inventario
                                    </label>

                                    <input type="number"
                                           id="stock"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('stock')}
                                               ? 'is-invalid'"
                                           th:field="*{stock}"
                                           min="0"
                                           placeholder="Ejemplo: 25">

                                    <div class="invalid-feedback"
                                         th:errors="*{stock}">
                                    </div>

                                </div>

                            </div>

                            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">

                                <a th:href="@{/medicamentos}"
                                   class="btn btn-secondary">
                                    Volver
                                </a>

                                <button type="submit"
                                        class="btn btn-farmacia"
                                        th:text="${medicamento.id == null}
                                            ? 'Registrar medicamento'
                                            : 'Guardar cambios'">
                                    Guardar
                                </button>

                            </div>

                        </form>

                    </div>

                </section>

            </div>

        </div>

    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <div th:replace="~{fragments/head :: bootstrap-js}"></div>

</body>

</html>
