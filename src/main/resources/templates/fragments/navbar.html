<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-farmacia"
     th:fragment="navbar">

    <div class="container">

        <a class="navbar-brand" th:href="@{/}">
            Farmacia Vida
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#menuPrincipal"
                aria-controls="menuPrincipal"
                aria-expanded="false"
                aria-label="Mostrar menú">

            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menuPrincipal">

            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">
                        Inicio
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/clientes}">
                        Clientes
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/medicamentos}">
                        Medicamentos
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/proveedores}">
                        Proveedores
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/inventario}">
                        Inventario
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/facturas}">
                        Facturas
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/reportes}">
                        Reportes
                    </a>
                </li>

            </ul>

            <div class="d-flex align-items-center gap-3">

                <span class="text-white-50 small d-none d-lg-inline">
                    Panel administrativo
                </span>

                <form th:action="@{/logout}" method="post">

                    <button class="btn btn-outline-light btn-sm"
                            type="submit">
                        Cerrar sesión
                    </button>

                </form>

            </div>

        </div>

    </div>

</nav>

</body>

</html>
