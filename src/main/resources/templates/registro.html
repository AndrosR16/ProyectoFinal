<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Crear cuenta - Farmacia</title>

    <link th:replace="~{fragments/head :: bootstrap-css}">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <main class="container py-5">

        <div class="row justify-content-center">

            <div class="col-lg-8">

                <section class="encabezado-pagina mb-4">

                    <span class="insignia-proveedor mb-2">
                        Nuevo registro
                    </span>

                    <h1>
                        Crear cuenta
                    </h1>

                    <p>
                        Complete la información para registrar una nueva cuenta de acceso.
                    </p>

                </section>

                <section class="card formulario-farmacia">

                    <div class="card-body">

                        <form th:object="${registroForm}"
                              th:action="@{/registro}"
                              method="post">

                            <div class="mb-4">

                                <label for="username" class="form-label">
                                    Usuario
                                </label>

                                <input type="text"
                                       id="username"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('username')}
                                           ? 'is-invalid'"
                                       th:field="*{username}"
                                       placeholder="Ingrese un nombre de usuario">

                                <div class="invalid-feedback"
                                     th:errors="*{username}">
                                </div>

                            </div>

                            <div class="mb-4">

                                <label for="nombre" class="form-label">
                                    Nombre completo
                                </label>

                                <input type="text"
                                       id="nombre"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('nombre')}
                                           ? 'is-invalid'"
                                       th:field="*{nombre}"
                                       placeholder="Ingrese su nombre completo">

                                <div class="invalid-feedback"
                                     th:errors="*{nombre}">
                                </div>

                            </div>

                            <div class="mb-4">

                                <label for="correo" class="form-label">
                                    Correo electrónico
                                </label>

                                <input type="email"
                                       id="correo"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('correo')}
                                           ? 'is-invalid'"
                                       th:field="*{correo}"
                                       placeholder="Ejemplo: correo@dominio.com">

                                <div class="invalid-feedback"
                                     th:errors="*{correo}">
                                </div>

                            </div>

                            <div class="row">

                                <div class="col-md-6 mb-4">

                                    <label for="password" class="form-label">
                                        Contraseña
                                    </label>

                                    <input type="password"
                                           id="password"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('password')}
                                               ? 'is-invalid'"
                                           th:field="*{password}"
                                           placeholder="Ingrese una contraseña">

                                    <div class="invalid-feedback"
                                         th:errors="*{password}">
                                    </div>

                                </div>

                                <div class="col-md-6 mb-4">

                                    <label for="confirmPassword" class="form-label">
                                        Confirmar contraseña
                                    </label>

                                    <input type="password"
                                           id="confirmPassword"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('confirmPassword')}
                                               ? 'is-invalid'"
                                           th:field="*{confirmPassword}"
                                           placeholder="Repita la contraseña">

                                    <div class="invalid-feedback"
                                         th:errors="*{confirmPassword}">
                                    </div>

                                </div>

                            </div>

                            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">

                                <a th:href="@{/login}"
                                   class="btn btn-secondary">
                                    Ya tengo una cuenta
                                </a>

                                <button type="submit"
                                        class="btn btn-farmacia">
                                    Crear cuenta
                                </button>

                            </div>

                        </form>

                    </div>

                </section>

            </div>

        </div>

    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <div th:replace="~{fragments/head :: bootstrap-js}"></div>

</body>

</html>
