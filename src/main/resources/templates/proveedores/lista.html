<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proveedores - Farmacia</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="fw-bold">Proveedores</h1>
            <p class="text-muted mb-0">
                Registro y mantenimiento de proveedores de la farmacia.
            </p>
        </div>

        <a th:href="@{/proveedores/nuevo}" class="btn btn-farmacia">
            Nuevo proveedor
        </a>
    </div>

    <div class="alert alert-success"
         th:if="${ok}"
         th:text="${ok}">
    </div>

    <div class="alert alert-danger"
         th:if="${error}"
         th:text="${error}">
    </div>

    <div class="card shadow-sm">
        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead class="table-success">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Teléfono</th>
                        <th>Correo</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="proveedor : ${proveedores}">
                        <td th:text="${proveedor.id}"></td>
                        <td th:text="${proveedor.nombre}"></td>
                        <td th:text="${proveedor.telefono}"></td>
                        <td th:text="${proveedor.correo}"></td>

                        <td class="text-center">

                            <a th:href="@{/proveedores/{id}/editar(id=${proveedor.id})}"
                               class="btn btn-warning btn-sm">
                                Editar
                            </a>

                            <button type="button"
                                    class="btn btn-danger btn-sm"
                                    data-bs-toggle="modal"
                                    data-bs-target="#modalEliminar"
                                    th:attr="data-id=${proveedor.id},
                                             data-nombre=${proveedor.nombre}">
                                Eliminar
                            </button>

                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(proveedores)}">
                        <td colspan="5" class="text-center text-muted py-4">
                            No hay proveedores registrados.
                        </td>
                    </tr>

                    </tbody>

                </table>

            </div>

        </div>
    </div>

</main>

<div class="modal fade"
     id="modalEliminar"
     tabindex="-1"
     aria-labelledby="modalEliminarLabel"
     aria-hidden="true">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title" id="modalEliminarLabel">
                    Confirmar eliminación
                </h5>

                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="modal"
                        aria-label="Cerrar">
                </button>
            </div>

            <div class="modal-body">
                ¿Está seguro de eliminar al proveedor
                <strong id="nombreProveedor"></strong>?
            </div>

            <div class="modal-footer">

                <button type="button"
                        class="btn btn-secondary"
                        data-bs-dismiss="modal">
                    Cancelar
                </button>

                <form id="formEliminar" method="post">
                    <button type="submit" class="btn btn-danger">
                        Eliminar
                    </button>
                </form>

            </div>

        </div>

    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

<script>
    const modalEliminar = document.getElementById('modalEliminar');

    modalEliminar.addEventListener('show.bs.modal', function (event) {
        const boton = event.relatedTarget;
        const id = boton.getAttribute('data-id');
        const nombre = boton.getAttribute('data-nombre');

        document.getElementById('nombreProveedor').textContent = nombre;
        document.getElementById('formEliminar').action =
            '/proveedores/' + id + '/eliminar';
    });
</script>

</body>
</html>
