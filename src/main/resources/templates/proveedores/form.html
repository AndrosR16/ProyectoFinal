<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title th:text="${proveedor.id == null}
        ? 'Nuevo proveedor'
        : 'Editar proveedor'">
        Proveedor
    </title>

    <link th:replace="~{fragments/head :: bootstrap-css}">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="container py-5">

        <div class="row justify-content-center">

            <div class="col-lg-8">

                <section class="encabezado-pagina mb-4">

                    <span class="insignia-proveedor mb-2"
                          th:text="${proveedor.id == null}
                              ? 'Nuevo registro'
                              : 'Actualización de datos'">
                    </span>

                    <h1 th:text="${proveedor.id == null}
                        ? 'Registrar proveedor'
                        : 'Editar proveedor'">
                    </h1>

                    <p th:text="${proveedor.id == null}
                        ? 'Complete la información para registrar un nuevo proveedor.'
                        : 'Actualice los datos del proveedor seleccionado.'">
                    </p>

                </section>

                <section class="card formulario-farmacia">

                    <div class="card-body">

                        <form th:object="${proveedor}"
                              th:action="${proveedor.id == null}
                                  ? @{/proveedores}
                                  : @{/proveedores/{id}(id=${proveedor.id})}"
                              method="post">

                            <div class="mb-4">

                                <label for="nombre" class="form-label">
                                    Nombre del proveedor
                                </label>

                                <input type="text"
                                       id="nombre"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('nombre')}
                                           ? 'is-invalid'"
                                       th:field="*{nombre}"
                                       placeholder="Ejemplo: Distribuidora Médica CR">

                                <div class="invalid-feedback"
                                     th:errors="*{nombre}">
                                </div>

                                <div class="form-text">
                                    Ingrese el nombre comercial o razón social.
                                </div>

                            </div>

                            <div class="row">

                                <div class="col-md-6 mb-4">

                                    <label for="telefono" class="form-label">
                                        Teléfono
                                    </label>

                                    <input type="text"
                                           id="telefono"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('telefono')}
                                               ? 'is-invalid'"
                                           th:field="*{telefono}"
                                           placeholder="Ejemplo: 2222-1111">

                                    <div class="invalid-feedback"
                                         th:errors="*{telefono}">
                                    </div>

                                    <div class="form-text">
                                        Número de contacto del proveedor.
                                    </div>

                                </div>

                                <div class="col-md-6 mb-4">

                                    <label for="correo" class="form-label">
                                        Correo electrónico
                                    </label>

                                    <input type="email"
                                           id="correo"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('correo')}
                                               ? 'is-invalid'"
                                           th:field="*{correo}"
                                           placeholder="Ejemplo: ventas@proveedor.com">

                                    <div class="invalid-feedback"
                                         th:errors="*{correo}">
                                    </div>

                                    <div class="form-text">
                                        Correo utilizado para pedidos y comunicación.
                                    </div>

                                </div>

                            </div>

                            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">

                                <a th:href="@{/proveedores}"
                                   class="btn btn-secondary">
                                    Volver
                                </a>

                                <button type="submit"
                                        class="btn btn-farmacia"
                                        th:text="${proveedor.id == null}
                                            ? 'Registrar proveedor'
                                            : 'Guardar cambios'">
                                    Guardar
                                </button>

                            </div>

                        </form>

                    </div>

                </section>

            </div>

        </div>

    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <div th:replace="~{fragments/head :: bootstrap-js}"></div>

</body>

</html>
