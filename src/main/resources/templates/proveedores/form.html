<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title th:text="${proveedor.id == null}
        ? 'Nuevo proveedor'
        : 'Editar proveedor'">
        Proveedor
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-7">

            <div class="card shadow-sm">

                <div class="card-body p-4">

                    <h1 class="fw-bold mb-4"
                        th:text="${proveedor.id == null}
                            ? 'Registrar proveedor'
                            : 'Editar proveedor'">
                    </h1>

                    <form th:object="${proveedor}"
                          th:action="${proveedor.id == null}
                              ? @{/proveedores}
                              : @{/proveedores/{id}(id=${proveedor.id})}"
                          method="post">

                        <div class="mb-3">

                            <label for="nombre" class="form-label">
                                Nombre
                            </label>

                            <input type="text"
                                   id="nombre"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('nombre')}
                                       ? 'is-invalid'"
                                   th:field="*{nombre}">

                            <div class="invalid-feedback"
                                 th:errors="*{nombre}">
                            </div>

                        </div>

                        <div class="mb-3">

                            <label for="telefono" class="form-label">
                                Teléfono
                            </label>

                            <input type="text"
                                   id="telefono"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('telefono')}
                                       ? 'is-invalid'"
                                   th:field="*{telefono}">

                            <div class="invalid-feedback"
                                 th:errors="*{telefono}">
                            </div>

                        </div>

                        <div class="mb-3">

                            <label for="correo" class="form-label">
                                Correo electrónico
                            </label>

                            <input type="email"
                                   id="correo"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('correo')}
                                       ? 'is-invalid'"
                                   th:field="*{correo}">

                            <div class="invalid-feedback"
                                 th:errors="*{correo}">
                            </div>

                        </div>

                        <div class="d-flex justify-content-end gap-2">

                            <a th:href="@{/proveedores}"
                               class="btn btn-secondary">
                                Cancelar
                            </a>

                            <button type="submit"
                                    class="btn btn-farmacia">
                                Guardar
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
